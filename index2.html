<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素画板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
min-height: 100vh;
background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
display: flex;
justify-content: center;
align-items: center;
font-family: 'Segoe UI', system-ui, sans-serif;
padding: 20px;
}
.container {
background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
border-radius: 24px;
padding: 30px;
border: 1px solid rgba(255,255,255,0.1);
box-shadow: 0 30px 60px rgba(0,0,0,0.5);
}
h1 {
text-align: center;
color: #fff;
font-size: 28px;
margin-bottom: 20px;
letter-spacing: 2px;
}
h1 span { color: #ff6b9d; }
.toolbar {
display: flex;
align-items: center;
gap: 12px;
flex-wrap: wrap;
margin-bottom: 20px;
justify-content: center;
}
.color-picker {
display: flex;
align-items: center;
gap: 8px;
color: #ccc;
font-size: 14px;
}
.color-picker input { width: 36px; height: 36px; border: none; border-radius: 50%; cursor: pointer; padding: 0; background: none; }
.color-picker input::-webkit-color-swatch-wrapper { padding: 0; }
.color-picker input::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; }
.presets {
display: flex;
gap: 6px;
}
.preset {
width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s;
}
.preset:hover, .preset.active { border-color: #fff; transform: scale(1.15); }
.btn {
padding: 8px 18px;
border: none;
border-radius: 10px;
cursor: pointer;
font-size: 14px;
font-weight: 600;
transition: 0.25s;
color: #fff;
}
.btn-clear { background: #ff6b6b; }
.btn-clear:hover { background: #ee5a24; transform: translateY(-2px); }
.btn-eraser { background: #6c5ce7; }
.btn-eraser:hover { background: #5a4bd1; transform: translateY(-2px); }
.btn-eraser.active { background: #ffa502; box-shadow: 0 0 12px #ffa502; }
.btn-download { background: #2ed573; }
.btn-download:hover { background: #26ac5c; transform: translateY(-2px); }
.btn-undo { background: #ffa502; }
.btn-undo:hover { background: #e69500; transform: translateY(-2px); }
.grid-size {
display: flex;
align-items: center;
gap: 8px;
color: #ccc;
font-size: 14px;
}
.grid-size input {
width: 60px;
padding: 6px 10px;
border-radius: 8px;
border: 1px solid rgba(255,255,255,0.15);
background: rgba(255,255,255,0.1);
color: #fff;
font-size: 14px;
text-align: center;
outline: none;
}
.grid-size input:focus { border-color: #ff6b9d; }
.grid-size button {
padding: 6px 14px;
border: none;
border-radius: 8px;
background: #ff6b9d;
color: #fff;
cursor: pointer;
font-weight: 600;
transition: 0.2s;
}
.grid-size button:hover { background: #e55a8a; }
.canvas-wrapper {
display: flex;
justify-content: center;
}
canvas {
border-radius: 12px;
border: 2px solid rgba(255,255,255,0.1);
cursor: crosshair;
image-rendering: pixelated;
max-width: 100%;
}
.info {
display: flex;
justify-content: space-between;
margin-top: 14px;
color: rgba(255,255,255,0.5);
font-size: 13px;
}
</style>
</head>
<body>
<div class="container">
<h1>Pixel <span>Art</span></h1>

<div class="toolbar">
<div class="color-picker">
颜色 <input type="color" id="colorPicker" value="#ff6b9d">
</div>
<div class="presets">
<div class="preset" style="background:#ff6b9d" data-color="#ff6b9d"></div>
<div class="preset" style="background:#2ed573" data-color="#2ed573"></div>
<div class="preset" style="background:#1e90ff" data-color="#1e90ff"></div>
<div class="preset" style="background:#ffa502" data-color="#ffa502"></div>
<div class="preset" style="background:#a29bfe" data-color="#a29bfe"></div>
<div class="preset" style="background:#fff" data-color="#ffffff"></div>
<div class="preset" style="background:#2d3436" data-color="#2d3436"></div>
</div>
<button class="btn btn-eraser" id="eraserBtn">橡皮</button>
<button class="btn btn-undo" id="undoBtn">撤销</button>
<button class="btn btn-clear" id="clearBtn">清空</button>
<button class="btn btn-download" id="downloadBtn">保存</button>
</div>

<div class="toolbar">
<div class="grid-size">
格子数
<input type="number" id="gridSizeInput" value="16" min="4" max="64">
<button id="resizeBtn">重置</button>
</div>
</div>

<div class="canvas-wrapper">
<canvas id="canvas"></canvas>
</div>

<div class="info">
<span>左键绘制 · 右键取色</span>
<span id="pixelInfo">0 / 0</span>
</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const colorPicker = document.getElementById('colorPicker');
const eraserBtn = document.getElementById('eraserBtn');
const undoBtn = document.getElementById('undoBtn');
const clearBtn = document.getElementById('clearBtn');
const downloadBtn = document.getElementById('downloadBtn');
const gridSizeInput = document.getElementById('gridSizeInput');
const resizeBtn = document.getElementById('resizeBtn');
const pixelInfo = document.getElementById('pixelInfo');

let gridSize = 16;
let cellSize;
let isDrawing = false;
let isEraser = false;
let history = [];
let maxHistory = 30;

function resizeCanvas() {
const maxW = Math.min(500, window.innerWidth - 100);
cellSize = Math.floor(maxW / gridSize);
canvas.width = cellSize * gridSize;
canvas.height = cellSize * gridSize;
initGrid();
}

function initGrid() {
const size = gridSize * gridSize;
if (history.length === 0) {
const blank = new Uint8ClampedArray(size * 4);
for (let i = 0; i < size; i++) {
blank[i*4+3] = 255;
}
history.push(blank);
}
render();
}

function render() {
const data = history[history.length - 1];
const imageData = new ImageData(new Uint8ClampedArray(data), gridSize, gridSize);
const tempCanvas = document.createElement('canvas');
tempCanvas.width = gridSize;
tempCanvas.height = gridSize;
const tempCtx = tempCanvas.getContext('2d');
tempCtx.putImageData(imageData, 0, 0);
ctx.imageSmoothingEnabled = false;
ctx.clearRect(0, 0, canvas.width, canvas.height);
ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height);
drawGrid();
updatePixelInfo();
}

function drawGrid() {
ctx.strokeStyle = 'rgba(255,255,255,0.08)';
ctx.lineWidth = 0.5;
for (let i = 0; i <= gridSize; i++) {
ctx.beginPath();
ctx.moveTo(i * cellSize, 0);
ctx.lineTo(i * cellSize, canvas.height);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(0, i * cellSize);
ctx.lineTo(canvas.width, i * cellSize);
ctx.stroke();
}
}

function getPixelIndex(x, y) {
const col = Math.floor(x / cellSize);
const row = Math.floor(y / cellSize);
if (col < 0 || col >= gridSize || row < 0 || row >= gridSize) return -1;
return (row * gridSize + col) * 4;
}

function drawPixel(col, row, color) {
const idx = (row * gridSize + col) * 4;
const data = new Uint8ClampedArray(history[history.length - 1]);
const r = parseInt(color.slice(1,3), 16);
const g = parseInt(color.slice(3,5), 16);
const b = parseInt(color.slice(5,7), 16);
data[idx] = r;
data[idx+1] = g;
data[idx+2] = b;
data[idx+3] = 255;
if (history.length >= maxHistory) history.shift();
history.push(data);
render();
}

function handleDraw(e) {
if (!isDrawing) return;
const rect = canvas.getBoundingClientRect();
const x = (e.clientX - rect.left) * (canvas.width / rect.width);
const y = (e.clientY - rect.top) * (canvas.height / rect.height);
const col = Math.floor(x / cellSize);
const row = Math.floor(y / cellSize);
if (col < 0 || col >= gridSize || row < 0 || row >= gridSize) return;
const idx = (row * gridSize + col) * 4;
const lastData = history[history.length - 1];
const color = isEraser ? '#000000' : colorPicker.value;
const cr = parseInt(color.slice(1,3), 16);
const cg = parseInt(color.slice(3,5), 16);
const cb = parseInt(color.slice(5,7), 16);
if (lastData[idx] === cr && lastData[idx+1] === cg && lastData[idx+2] === cb) return;
drawPixel(col, row, color);
}

canvas.addEventListener('mousedown', (e) => {
if (e.button === 2) {
const rect = canvas.getBoundingClientRect();
const x = (e.clientX - rect.left) * (canvas.width / rect.width);
const y = (e.clientY - rect.top) * (canvas.height / rect.height);
const col = Math.floor(x / cellSize);
const row = Math.floor(y / cellSize);
if (col < 0 || col >= gridSize || row < 0 || row >= gridSize) return;
const idx = (row * gridSize + col) * 4;
const data = history[history.length - 1];
const r = data[idx], g = data[idx+1], b = data[idx+2];
const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
colorPicker.value = hex;
return;
}
isDrawing = true;
handleDraw(e);
});
canvas.addEventListener('mousemove', handleDraw);
canvas.addEventListener('mouseup', () => { isDrawing = false; });
canvas.addEventListener('mouseleave', () => { isDrawing = false; });
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

document.querySelectorAll('.preset').forEach(el => {
el.addEventListener('click', () => {
document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
el.classList.add('active');
colorPicker.value = el.dataset.color;
isEraser = false;
eraserBtn.classList.remove('active');
});
});

eraserBtn.addEventListener('click', () => {
isEraser = !isEraser;
eraserBtn.classList.toggle('active');
});

undoBtn.addEventListener('click', () => {
if (history.length > 1) {
history.pop();
render();
}
});

clearBtn.addEventListener('click', () => {
const blank = new Uint8ClampedArray(gridSize * gridSize * 4);
for (let i = 0; i < gridSize * gridSize; i++) blank[i*4+3] = 255;
history.push(blank);
if (history.length > maxHistory) history.shift();
render();
});

downloadBtn.addEventListener('click', () => {
const scale = 10;
const bigCanvas = document.createElement('canvas');
bigCanvas.width = gridSize * scale;
bigCanvas.height = gridSize * scale;
const bigCtx = bigCanvas.getContext('2d');
const data = history[history.length - 1];
const imageData = new ImageData(new Uint8ClampedArray(data), gridSize, gridSize);
const temp = document.createElement('canvas');
temp.width = gridSize;
temp.height = gridSize;
temp.getContext('2d').putImageData(imageData, 0, 0);
bigCtx.imageSmoothingEnabled = false;
bigCtx.drawImage(temp, 0, 0, bigCanvas.width, bigCanvas.height);
const link = document.createElement('a');
link.download = 'pixel-art.png';
link.href = bigCanvas.toDataURL();
link.click();
});

resizeBtn.addEventListener('click', () => {
let val = parseInt(gridSizeInput.value);
if (isNaN(val)) val = 16;
val = Math.max(4, Math.min(64, val));
gridSizeInput.value = val;
gridSize = val;
history = [];
resizeCanvas();
});

function updatePixelInfo() {
let filled = 0;
const data = history[history.length - 1];
for (let i = 0; i < gridSize * gridSize; i++) {
const r = data[i*4], g = data[i*4+1], b = data[i*4+2];
if (r !== 0 || g !== 0 || b !== 0) filled++;
}
pixelInfo.textContent = filled + ' / ' + (gridSize * gridSize);
}

resizeCanvas();
</script>
</body>
</html>
